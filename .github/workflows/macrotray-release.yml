name: MacroTray Windows release

on:
  push:
    tags:
      - "macrotray-v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      MACROTRAY_APP_URL: https://macroverse.vercel.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Import Authenticode certificate and configure release keys
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE_PFX -or -not $env:TAURI_UPDATER_PUBLIC_KEY) { throw "MacroTray signing secrets are not configured" }
          $pfxPath = Join-Path $env:RUNNER_TEMP "macrotray-signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX))
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          $configPath = "src-tauri/tauri.conf.json"
          $config = Get-Content -Raw -LiteralPath $configPath | ConvertFrom-Json
          $config.bundle.windows | Add-Member -NotePropertyName certificateThumbprint -NotePropertyValue $certificate.Thumbprint -Force
          $config.plugins.updater.pubkey = $env:TAURI_UPDATER_PUBLIC_KEY
          $config | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath $configPath -Encoding utf8

      - name: Verify web production build
        run: npm run build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MacroTray ${{ github.ref_name }}"
          releaseBody: "Signed Windows x64 MacroTray installer and updater metadata."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
