<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>MacroVerse</title>
    <style>
      :root {
        --bg: #0a0a0b;
        --surface: #17171a;
        --text: #ededf0;
        --text-dim: #9a9aa5;
        --accent: #f97316;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
        text-align: center;
      }
      .wrap { max-width: 20rem; }
      .logo { font-size: 1.75rem; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 2rem; }
      .logo span { color: var(--accent); }
      .glyph {
        width: 64px; height: 64px; margin: 0 auto 1.25rem;
        display: grid; place-items: center;
        border-radius: 20px; background: var(--surface);
        color: var(--accent); font-size: 30px;
      }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { color: var(--text-dim); font-size: 0.9rem; line-height: 1.5; margin: 0 0 1.75rem; }
      button {
        appearance: none; border: 0; cursor: pointer;
        background: var(--accent); color: #000; font-weight: 700; font-size: 0.95rem;
        padding: 0.85rem 1.5rem; border-radius: 12px; width: 100%;
      }
      button:active { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">Macro<span>verse</span></div>
      <div class="glyph" aria-hidden="true">&#9888;</div>
      <h1>You&rsquo;re offline</h1>
      <p>MacroVerse needs a connection to load. Check your network and try again.</p>
      <button type="button" onclick="location.reload()">Retry</button>
    </div>
    <script>
      // Auto-retry the moment connectivity returns so the user rarely taps Retry.
      window.addEventListener("online", function () { location.reload(); });
    </script>
  </body>
</html>
